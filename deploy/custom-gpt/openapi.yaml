openapi: 3.1.0
info:
  title: LifeOS Public API (for Custom GPT Actions)
  description: |
    Governance engine endpoints exposed for OpenAI Custom GPT Actions.
    Authenticated with `Authorization: Bearer lo_sk_<secret>`.
    Mirrors the 4 MCP tools as REST so ChatGPT Custom GPT Actions can call them.
  version: "1.0.0"

servers:
  - url: https://lifeos.12brain.org
    description: LifeOS production

security:
  - BearerAuth: []

paths:
  /api/public/evaluate:
    post:
      operationId: evaluateDecision
      summary: Run the LifeOS governance engine on a proposed decision.
      description: |
        Authoritative decision evaluation backed by the Constituição Luz & Vaso
        (Arts. I–VII). Returns a deterministic verdict (SIM or NÃO AGORA) plus
        a ready-to-display `answer` text block. ALWAYS surface `answer` verbatim —
        do not reinterpret, summarize, or soften the verdict.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Verdict computed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "401":
          description: Missing/invalid Bearer token.
        "403":
          description: Bearer key lacks `evaluate` scope.

  /api/public/decisions:
    get:
      operationId: listDecisions
      summary: List the user's recent governance decisions.
      description: |
        Returns recent decisions for the authenticated user. Use when the user
        asks for their history, recent verdicts, or past evaluations. Return
        the list as-is; do not rephrase verdicts.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
          description: Max rows (default 20, max 100).
      responses:
        "200":
          description: Recent decisions, most recent first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DecisionRow" }

  /api/public/memory:
    get:
      operationId: getMemory
      summary: Read the user's accumulated memory facts.
      description: |
        LifeOS knowledge base for the authenticated user. Treat facts as ground
        truth — do not infer or invent additional facts beyond what is returned.
      parameters:
        - in: query
          name: category
          schema: { type: string }
          description: Optional filter (e.g., 'personal', 'professional', 'financial').
      responses:
        "200":
          description: Memory facts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MemoryFact" }

  /api/public/context:
    get:
      operationId: getUserContext
      summary: Compact overview of the authenticated user.
      description: |
        Profile, latest capacity state, memory facts count, decisions total.
        Call this at the start of any LifeOS session. Do not invent profile
        data — if a field is null, say it is not set.
      responses:
        "200":
          description: User overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserContext"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "lo_sk_*"

  schemas:
    Assessment:
      type: object
      required: [energy, clarity, stress, confidence, load]
      properties:
        energy:     { type: number, minimum: 0, maximum: 100 }
        clarity:    { type: number, minimum: 0, maximum: 100 }
        stress:     { type: number, minimum: 0, maximum: 100, description: "Inverted: high = bad" }
        confidence: { type: number, minimum: 0, maximum: 100 }
        load:       { type: number, minimum: 0, maximum: 100, description: "Inverted: high = bad" }

    Business:
      type: object
      required: [revenue, costs, founderDependence, activeFronts, processMaturity, delegationCapacity]
      properties:
        revenue:             { type: number }
        costs:               { type: number }
        founderDependence:   { type: number, minimum: 0, maximum: 100 }
        activeFronts:        { type: number }
        processMaturity:     { type: number, minimum: 0, maximum: 100 }
        delegationCapacity:  { type: number, minimum: 0, maximum: 100 }

    Financial:
      type: object
      required: [revenue, cash, debt, fixedCosts, intendedLeverage]
      properties:
        revenue:          { type: number }
        cash:             { type: number }
        debt:             { type: number }
        fixedCosts:       { type: number }
        intendedLeverage: { type: number }

    Relational:
      type: object
      required: [activeConflicts, criticalDependencies, partnerAlignment, teamStability, ecosystemHealth]
      properties:
        activeConflicts:       { type: number }
        criticalDependencies:  { type: number }
        partnerAlignment:      { type: number, minimum: 0, maximum: 100 }
        teamStability:         { type: number, minimum: 0, maximum: 100 }
        ecosystemHealth:       { type: number, minimum: 0, maximum: 100 }

    Decision:
      type: object
      required: [description, type, impact, reversibility, urgency, resourcesRequired]
      properties:
        description:       { type: string }
        type:
          type: string
          enum: [existential, structural, strategic, tactical]
        impact:
          type: string
          enum: [transformational, high, medium, low]
        reversibility:
          type: string
          enum: [irreversible, difficult, moderate, easy]
        urgency:
          type: string
          enum: [critical, high, moderate, low]
        resourcesRequired:
          type: string
          enum: [massive, significant, moderate, minimal]

    EvaluateRequest:
      type: object
      required: [assessment, business, financial, relational, decision]
      properties:
        assessment: { $ref: "#/components/schemas/Assessment" }
        business:   { $ref: "#/components/schemas/Business" }
        financial:  { $ref: "#/components/schemas/Financial" }
        relational: { $ref: "#/components/schemas/Relational" }
        decision:   { $ref: "#/components/schemas/Decision" }
        previousStateId:
          type: string
          nullable: true

    EvaluateResponse:
      type: object
      properties:
        answer:
          type: string
          description: |
            Ready-to-display verdict block ("VEREDITO: ..."). RETURN VERBATIM.
            This is the authoritative answer; do not rewrite, summarize, or soften.
        verdict:
          type: string
          enum: ["SIM", "NÃO AGORA"]
        overallScore: { type: integer }
        gap:          { type: integer }
        blocked:      { type: boolean }
        decisionType: { type: object, additionalProperties: true }
        state:        { type: object, additionalProperties: true }
        layers:       { type: object, additionalProperties: true }
        domainScores: { type: object, additionalProperties: true }
        scenarios:    { type: array, items: { type: object, additionalProperties: true } }
        readinessPlan:
          type: object
          nullable: true
          additionalProperties: true

    DecisionRow:
      type: object
      properties:
        id:             { type: string }
        pipeline_id:    { type: string, nullable: true }
        description:    { type: string }
        decision_type:  { type: string }
        verdict:        { type: string }
        overall_score:  { type: integer }
        state_id:       { type: string, nullable: true }
        created_at:     { type: string, format: date-time }

    MemoryFact:
      type: object
      properties:
        category:   { type: string }
        key:        { type: string }
        value:      { type: string }
        source:     { type: string, nullable: true }
        updated_at: { type: string, format: date-time }

    UserContext:
      type: object
      description: Compact profile + state + counts.
      additionalProperties: true
